<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Fortune — สยามโหรามงคล</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #0f172a; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gold-text { background: linear-gradient(135deg, #e8c97a 0%, #f0e0b0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md w-full glass rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-yellow-500/10 rounded-full blur-3xl"></div>
        
        <header class="text-center mb-8">
            <h1 class="text-2xl font-semibold gold-text">วิเคราะห์ดวงฉับพลัน</h1>
            <p class="text-slate-400 text-sm mt-1">คัมภีร์มหาทักษาสัตตเลข</p>
        </header>

        <div class="space-y-6">
            <!-- ส่วนเลือกสมาชิก -->
            <div class="mb-4">
                <label class="text-xs text-slate-500 ml-2" for="member-select">ดึงข้อมูลจากทะเบียนสมาชิก</label>
                <select id="member-select" onchange="loadMemberData()" class="w-full bg-slate-800/50 border border-yellow-500/20 rounded-2xl py-3 px-4 focus:border-yellow-500 outline-none transition text-yellow-400">
                    <option value="">-- เลือกรายชื่อสมาชิก --</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-slate-500 ml-2" for="in-day">วันเกิด (จ.-อา.)</label>
                    <select id="in-day" class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl py-3 px-4 focus:border-yellow-500 outline-none transition text-white">
                        <option value="1">อาทิตย์</option><option value="2">จันทร์</option>
                        <option value="3">อังคาร</option><option value="4">พุธ</option>
                        <option value="5">พฤหัสบดี</option><option value="6">ศุกร์</option>
                        <option value="7">เสาร์</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-slate-500 ml-2" for="in-year">ปีนักษัตร</label>
                    <select id="in-year" class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl py-3 px-4 focus:border-yellow-500 outline-none transition text-white">
                        <option value="1">ชวด/มะแม</option><option value="2">ฉลู/วอก</option>
                        <option value="3">ขาล/ระกา</option><option value="4">เถาะ/จอ</option>
                        <option value="5">มะโรง/กุน</option><option value="6">มะเส็ง</option>
                        <option value="7">มะเมีย</option>
                    </select>
                </div>
            </div>

            <button onclick="revealFortune()" class="w-full bg-gradient-to-r from-yellow-500 to-amber-600 text-slate-900 font-bold py-4 rounded-2xl shadow-lg shadow-yellow-500/20 hover:scale-[1.02] active:scale-95 transition">
                <i class="fa-solid fa-wand-sparkles mr-2"></i> เปิดคำทำนาย
            </button>

            <div id="result-card" class="hidden">
                <div class="p-6 rounded-3xl bg-slate-900/50 border border-yellow-500/20">
                    <div class="flex items-center gap-4 mb-4">
                        <div id="res-icon" class="text-4xl">☀️</div>
                        <div>
                            <div id="res-star" class="text-xl font-bold text-yellow-400">ดาวประจำตัว</div>
                            <div id="res-base" class="text-xs text-slate-500 uppercase tracking-widest">กำลังรวม</div>
                        </div>
                    </div>
                    <div id="res-content" class="space-y-4">
                        <p id="res-text" class="text-slate-200 leading-relaxed text-sm"></p>
                        <div id="res-linkage" class="p-3 bg-yellow-500/5 rounded-xl border-l-2 border-yellow-500/30 text-xs text-yellow-200/80 italic"></div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-8 text-center text-[10px] text-slate-600 tracking-widest uppercase">
            Powered by Siam Horamongkol
        </footer>
    </div>

    <script src="horo-database.js"></script>
    <script src="utils-helpers.js"></script>
    <script>
        // โหลดรายชื่อสมาชิกเมื่อเปิดหน้า
        window.addEventListener('load', () => {
            const history = JSON.parse(localStorage.getItem('horo_history') || '[]');
            const select = document.getElementById('member-select');
            
            history.forEach(m => {
                const opt = document.createElement('option');
                opt.value = JSON.stringify(m); // เก็บ object ไว้ใน value
                opt.textContent = `${m.memberId || ''} ${m.name} ${m.lastName || ''}`;
                select.appendChild(opt);
            });
        });

        function loadMemberData() {
            const select = document.getElementById('member-select');
            if (!select.value) return;

            const member = JSON.parse(select.value);
            
            // 1. จัดการวันเกิด (1-7)
            if (member.birthdate) {
                const parsedDate = parseBirthdate(member.birthdate);
                if (parsedDate) {
                    const dayOfWeek = parsedDate.dateObj.getDay(); // 0 = Sun, 1 = Mon...
                    const finalDay = dayOfWeek === 0 ? 1 : dayOfWeek + 1; // ปรับให้ 1 = Sun, 2 = Mon...
                    document.getElementById('in-day').value = finalDay;
                }
            }

            // 2. จัดการปีนักษัตร (1-7 ตามกลุ่มสัตตเลข)
            if (member.zodiac) {
                const zodiacMap = {
                    'ชวด': 1, 'มะแม': 1,
                    'ฉลู': 2, 'วอก': 2,
                    'ขาล': 3, 'ระกา': 3,
                    'เถาะ': 4, 'จอ': 4,
                    'มะโรง': 5, 'กุน': 5,
                    'มะเส็ง': 6,
                    'มะเมีย': 7
                };
                
                // ค้นหาค่าที่ตรงกับชื่อนักษัตร
                for (let key in zodiacMap) {
                    if (member.zodiac.includes(key)) {
                        document.getElementById('in-year').value = zodiacMap[key];
                        break;
                    }
                }
            }

            // แจ้งเตือนเล็กน้อย
            const resText = document.getElementById('res-text');
            const resultCard = document.getElementById('result-card');
            resultCard.classList.add('hidden'); // ซ่อนผลลัพธ์เก่าก่อน
            
            console.log("โหลดข้อมูลสมาชิกสำเร็จ:", member.name);
        }

        function revealFortune() {
            if (typeof HORO_DB === 'undefined') {
                alert('ไม่พบไฟล์ฐานข้อมูล horo-database.js กรุณาตรวจสอบว่ามีไฟล์นี้อยู่ในโฟลเดอร์เดียวกันหรือไม่');
                return;
            }

            const d = parseInt(document.getElementById('in-day').value);
            const y = parseInt(document.getElementById('in-year').value);
            const m = new Date().getMonth() + 1; // เดือนปัจจุบัน

            // คำนวณ Sattalek Matrix
            const matrix = calculateSattalekBase(d, m, y);
            const base4 = matrix[3][0]; 
            const starNum = matrix[0][0]; 
            
            // ดึงข้อมูลพื้นฐาน
            const starInfo = HORO_DB.planetInfo[starNum];
            const meaning = HORO_DB.sdMeanings[base4] || "ดวงชะตามีพลังปานกลาง มั่นคงตามลำดับ";

            // วิเคราะห์ดาวชนภพ (Linkage) - ตัวอย่างดึงคู่ อัตตา-ตนุ
            const linkageText = getLinkagePrediction("อัตตะ", "ตนุ");

            // แสดงผล UI
            document.getElementById('res-icon').textContent = starInfo.icon;
            document.getElementById('res-star').textContent = `ดาว${starInfo.name} (ครองชะตา)`;
            document.getElementById('res-star').style.color = starInfo.color;
            document.getElementById('res-base').textContent = `กำลังรวมฐานชีวิต: ${base4}`;
            document.getElementById('res-text').textContent = `✨ วิเคราะห์ว่า: ${meaning}`;
            document.getElementById('res-linkage').textContent = `🔗 จุดเชื่อมโยงดวง: ${linkageText}`;
            
            const resultCard = document.getElementById('result-card');
            resultCard.classList.remove('hidden');
            resultCard.classList.add('animate-in', 'fade-in', 'zoom-in');
        }
    </script>
</body>
</html>
