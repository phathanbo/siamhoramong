<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการฐานข้อมูลไพ่ป๊อก 32 ใบ - สยามโหรามงคล</title>
    
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="modern-theme.css">
    <style>
        body { background-color: #121212; color: #f8f9fa; font-family: 'Sarabun', sans-serif; }
        .admin-card { background: #1e1e1e; border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 15px; padding: 25px; margin-bottom: 25px; }
        .text-gold { color: #d4af37 !important; }
        .btn-gold { background: linear-gradient(135deg, #f1c40f, #d4af37); color: #121212; font-weight: bold; border: none; }
        .btn-gold:hover { background: linear-gradient(135deg, #d4af37, #b8860b); color: #121212; }
        .suit-badge { padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; }
        .suit-spades { background: rgba(0, 0, 0, 0.3); color: #e0e0e0; border: 1px solid #555; }
        .suit-hearts { background: rgba(220, 53, 69, 0.15); color: #ff6b6b; border: 1px solid #dc3545; }
        .suit-diamonds { background: rgba(253, 126, 20, 0.15); color: #fca5a5; border: 1px solid #fd7e14; }
        .suit-clubs { background: rgba(52, 58, 64, 0.3); color: #b2bec3; border: 1px solid #6c757d; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark border-bottom border-warning">
        <a class="navbar-brand text-gold" href="admin.html">
            <i class="fas fa-crown"></i> สยามโหรามงคล Admin
        </a>
    </nav>

    <div class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-gold mb-0"><i class="fas fa-database"></i> จัดการฐานข้อมูลไพ่ป๊อก (ตำรา 32 ใบ)</h2>
            <a href="admin.html" class="btn btn-outline-light"><i class="fas fa-arrow-left"></i> กลับหลังบ้าน</a>
        </div>

        <!-- Setup / Database status -->
        <div class="admin-card">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h4 class="text-gold mb-2"><i class="fas fa-info-circle"></i> สถานะฐานข้อมูลไพ่ป๊อก</h4>
                    <p class="text-white-50 mb-md-0">การทำนายตำรา 32 ใบ จะคัดไพ่เลข 2 ถึง 6 ออก และคงไว้เฉพาะ 7, 8, 9, 10, J, Q, K, A สำหรับ 4 หน้าไพ่</p>
                </div>
                <div class="col-md-4 text-md-right">
                    <button id="btnInitDb" class="btn btn-gold btn-lg mr-2" onclick="initializeCartomancyDb()"><i class="fas fa-cloud-upload-alt"></i> นำเข้าข้อมูลเริ่มต้น</button>
                    <button class="btn btn-outline-danger" onclick="resetCartomancyDb()"><i class="fas fa-sync-alt"></i> รีเซ็ตทั้งหมด</button>
                </div>
            </div>
        </div>

        <!-- Filters & Search -->
        <div class="admin-card">
            <div class="row">
                <div class="col-md-6 mb-3 mb-md-0">
                    <label class="text-white-50">ค้นหาไพ่:</label>
                    <div class="input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-dark text-gold border-secondary"><i class="fas fa-search"></i></span>
                        </div>
                        <input type="text" id="searchCardInput" class="form-control bg-dark text-white border-secondary" placeholder="พิมพ์ชื่อไพ่หรือความหมาย..." oninput="filterCards()">
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="text-white-50">กรองตามประเภทหน้าไพ่ (Suit):</label>
                    <div class="btn-group btn-block" role="group">
                        <button type="button" class="btn btn-dark active" onclick="setSuitFilter('all', this)">ทั้งหมด</button>
                        <button type="button" class="btn btn-dark text-danger" onclick="setSuitFilter('Hearts', this)">♥️ โพแดง</button>
                        <button type="button" class="btn btn-dark text-warning" onclick="setSuitFilter('Diamonds', this)">♦️ ข้าวหลามตัด</button>
                        <button type="button" class="btn btn-dark text-white-50" onclick="setSuitFilter('Clubs', this)">♣️ ดอกจิก</button>
                        <button type="button" class="btn btn-dark text-light" onclick="setSuitFilter('Spades', this)">♠️ โพดำ</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Cards Table -->
        <div class="admin-card p-0 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-dark table-hover mb-0">
                    <thead class="bg-black">
                        <tr>
                            <th style="width: 15%;">ไพ่</th>
                            <th style="width: 10%;">ดอกไพ่</th>
                            <th style="width: 25%;">ความหมายทั่วไป</th>
                            <th style="width: 15%;">การงาน</th>
                            <th style="width: 15%;">การเงิน</th>
                            <th style="width: 15%;">ความรัก</th>
                            <th style="width: 10%;" class="text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="cartomancyTableBody">
                        <tr>
                            <td colspan="7" class="text-center py-5 text-white-50">
                                <i class="fas fa-circle-notch fa-spin fa-2x mb-3 text-gold"></i><br>
                                กำลังโหลดฐานข้อมูลไพ่ป๊อก...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <!-- App Scripts -->
    <script src="firebase-config.js"></script>
    <script src="cartomancy-data.js"></script>
    <script src="adminCartomancyDb.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
