<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siamhora - 12 Zodiac Daily Premium</title>
    
    <!-- Bootstrap 4 -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    
    <!-- Google Fonts (Sarabun & Prompt) -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
    


    <style>
        body {
            background-color: #121212;
            color: #fff;
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }
        .sidebar {
            width: 350px;
            background: #1e1e1e;
            border-right: 1px solid #333;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            padding: 25px;
            overflow-y: auto;
            z-index: 100;
        }
        .main-content {
            margin-left: 350px;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #0a0a0a;
        }
        
        /* Premium Layout Styles */
        #zdCaptureArea {
            width: 1400px;
            height: 900px;
            background-color: #1a0831;
            background-image: url('assets/thai_astrology_bg.png');
            background-size: cover;
            background-position: center;
            border: 6px solid #e9b64c;
            border-radius: 20px;
            padding: 30px 40px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(233, 182, 76, 0.4);
            position: relative;
            overflow: hidden;
            font-family: 'Sarabun', sans-serif;
            box-sizing: border-box;
        }
        
        /* Ornate Gold Border for Capture Area */
        .ornate-border {
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 2px dashed rgba(233, 182, 76, 0.7);
            border-radius: 12px;
            pointer-events: none;
            z-index: 1;
        }

        .header-ribbon {
            display: inline-block;
            background: linear-gradient(180deg, #d4af37 0%, #b8860b 100%);
            padding: 12px 50px;
            border-radius: 5px;
            font-size: 2rem;
            color: #1a0831;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
            margin-top: 20px;
        }
        .header-ribbon::before, .header-ribbon::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            background: #e9b64c;
            clip-path: polygon(100% 0, 0 50%, 100% 100%);
        }
        .header-ribbon::before {
            left: -20px;
        }
        .header-ribbon::after {
            right: -20px;
            clip-path: polygon(0 0, 100% 50%, 0 100%);
        }

        .zodiac-card {
            background: linear-gradient(135deg, rgba(255,249,235,0.95) 0%, rgba(253,228,181,0.95) 100%);
            border: 3px solid #b8860b;
            border-radius: 12px;
            padding: 15px;
            color: #1a0831;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            position: relative;
            height: 250px;
            box-sizing: border-box;
            z-index: 2;
        }
        
        .zodiac-card::before {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid rgba(184, 134, 11, 0.5);
            border-radius: 8px;
            pointer-events: none;
        }

        .zodiac-icon-container {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #2c0f4c, #1a0831);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            color: #f9d976;
            border: 2px solid #d4af37;
            margin-right: 12px;
            flex-shrink: 0;
            box-shadow: inset 0 0 10px rgba(233,182,76,0.5);
        }

        #zdPreviewContainer {
            transform-origin: top left;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <!-- Back Button -->
        <button class="btn btn-outline-light mb-4" onclick="window.location.href='admin.html'">
            <i class="fas fa-arrow-left mr-2"></i> กลับไประบบหลังบ้าน
        </button>

        <h4 style="color: #d4af37; margin-bottom: 30px;">
            <i class="fas fa-th-large mr-2"></i>ดวง 12 ราศี (พรีเมียม)
        </h4>
        
        <div class="form-group mb-4">
            <label class="font-weight-bold" style="color: #d4af37;">📅 เลือกวันที่ทำนาย:</label>
            <input type="date" id="zdDate" class="form-control bg-dark text-white border-secondary" onchange="renderZodiacDailyPreview()">
            <small class="text-muted mt-2 d-block">ระบบจะดึงคำทำนายของวันดังกล่าวมาจัดเรียงในรูปแบบพรีเมียม</small>
        </div>
        
        <hr style="border-color: #333;">
        
        <button class="btn btn-warning btn-block font-weight-bold py-3 mt-4" style="border-radius: 10px; background: linear-gradient(135deg, #f1c40f, #d4af37); color: #000; border: none;" onclick="downloadZodiacDailyImage()">
            <i class="fas fa-download mr-2"></i> ดาวน์โหลดรูปภาพ
        </button>
        <p class="text-muted small mt-3 text-center mb-4">ภาพจะถูกบันทึกเป็นไฟล์ PNG ความละเอียด 1400x900</p>
        
        <button class="btn btn-primary btn-block font-weight-bold py-3" style="border-radius: 10px; background: linear-gradient(135deg, #1877F2, #0d5aab); color: #fff; border: none; box-shadow: 0 4px 15px rgba(24, 119, 242, 0.4);" onclick="copyTextForFacebook()">
            <i class="fab fa-facebook mr-2"></i> คัดลอกข้อความลง Facebook
        </button>
        <button class="btn btn-primary btn-block font-weight-bold py-3 mt-2" style="border-radius: 10px; background: linear-gradient(45deg, #1877F2, #3b5998); color: #fff; border: none;" onclick="postToFacebook()">
            <i class="fa-brands fa-facebook mr-2"></i> โพสต์ลงเพจ (พร้อมรูปภาพและข้อความ)
        </button>
        <p class="text-muted small mt-3 text-center mb-3">คัดลอกข้อความ หรือโพสต์ขึ้นเพจโดยตรง</p>
        
        <label class="font-weight-bold" style="color: #d4af37;">📝 ตัวอย่างข้อความ Facebook:</label>
        <textarea id="fbTextPreview" class="form-control bg-dark text-white border-secondary mb-4" rows="8" readonly style="font-size: 13px;"></textarea>
    </div>

    <div class="main-content">
        <div id="zdPreviewContainer">
            <!-- พื้นที่ที่จะถูกวาดเป็นรูป -->
            <div id="zdCaptureArea">
                <div class="ornate-border"></div>
                
                <!-- Header -->
                <div style="text-align: center; margin-bottom: 25px; position: relative; z-index: 2;">
                    <h1 style="font-size: 5.5rem; margin: 0; color: #f9d976; text-shadow: 3px 3px 6px rgba(0,0,0,0.9), 0 0 25px #e9b64c; font-weight: 700; line-height: 1.1; font-family: 'Prompt', sans-serif;">ทำนายดวงชะตา 12ราศี</h1>
                    <div class="header-ribbon" id="zdDateBadge" style="font-size: 1.6rem; padding: 12px 40px;">
                        ประจำวัน...
                    </div>
                    <div style="margin-top: 15px; font-size: 1.4rem; color: #f9d976; letter-spacing: 3px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);">✦ โดย สยามโหรามงคล ✦</div>
                </div>

                <!-- Grid 12 Zodiacs -->
                <div id="zdGrid" style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; margin-bottom: 15px; position: relative; z-index: 2;">
                    <!-- Rendered by JS -->
                </div>

                <!-- Footer -->
                <div style="text-align: center; color: #f9d976; font-size: 1.4rem; letter-spacing: 2px; position: relative; z-index: 2; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); margin-top: 20px;">
                    <i class="fas fa-sun" style="font-size: 1rem; color: #e9b64c;"></i> 
                    ทำดี คิดดี พูดดี จะมีแต่สิ่งดี ๆ เข้ามาในชีวิต 
                    <i class="fas fa-sun" style="font-size: 1rem; color: #e9b64c;"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Make sure to include the logic that has generateDailyZodiacFortunes -->
    <script src="zodiac-daily-data.js"></script>
    <script src="canvas-helpers.js"></script>
    <script src="adminZodiacDaily.js"></script>

    <script>
        // Init
        document.addEventListener('DOMContentLoaded', () => {
            const todayStr = new Date().toISOString().split('T')[0];
            document.getElementById('zdDate').value = todayStr;
            
            // Initial render
            setTimeout(() => {
                initZodiacDailyStandalone();
            }, 500);
        });
    </script>
</body>
</html>
