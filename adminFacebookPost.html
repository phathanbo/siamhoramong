<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้างโพสต์ Facebook - สยามโหรามงคล</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: #fff; 
            font-family: 'Sarabun', sans-serif; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        .header { 
            background: rgba(15, 12, 41, 0.8); 
            backdrop-filter: blur(10px);
            padding: 20px 40px; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.3); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 30px rgba(0,0,0,0.5); 
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { 
            margin: 0; 
            color: #FFDF73; 
            font-size: 26px; 
            text-shadow: 0 0 15px rgba(212,175,55,0.4); 
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header h1 i { color: #4267B2; }
        .back-btn { 
            background: rgba(255, 255, 255, 0.05); 
            color: #FFDF73; 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 10px 25px; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-decoration: none; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 16px; 
        }
        .back-btn:hover { 
            background: rgba(212, 175, 55, 0.15); 
            border-color: #d4af37; 
            box-shadow: 0 0 15px rgba(212,175,55,0.2);
            transform: translateY(-2px);
        }
        
        .content-area {
            display: flex;
            flex: 1;
            padding: 30px 40px;
            gap: 40px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .sidebar {
            flex: 0 0 450px;
            background: rgba(20, 15, 35, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            max-height: calc(100vh - 120px);
        }

        .sidebar::-webkit-scrollbar { width: 8px; }
        .sidebar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.5); border-radius: 4px; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { color: #d4af37; font-weight: 500; font-size: 15px; }
        .form-control {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 12px 15px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }
        .form-control:focus { border-color: #d4af37; box-shadow: 0 0 10px rgba(212,175,55,0.2); }
        textarea.form-control { min-height: 150px; resize: vertical; }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 5px;
        }
        .tool-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .tool-btn:hover { background: rgba(212, 175, 55, 0.5); }

        .btn-primary {
            background: linear-gradient(45deg, #d4af37, #f1c40f);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,175,55,0.4); }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }

        /* Preview Area */
        .preview-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            overflow-y: auto;
        }

        .fb-post-container {
            background: #ffffff;
            color: #1c1e21;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .fb-header {
            display: flex;
            padding: 12px 16px;
            gap: 10px;
        }
        .fb-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #eee;
            object-fit: cover;
        }
        .fb-user-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .fb-name { font-weight: 600; font-size: 15px; color: #050505; }
        .fb-time { font-size: 13px; color: #65676b; display: flex; align-items: center; gap: 4px; }
        .fb-time i { font-size: 12px; }
        
        .fb-content {
            padding: 4px 16px 16px 16px;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        /* The Image part to be exported */
        #exportImageArea {
            width: 100%;
            position: relative;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .image-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            z-index: 1;
            opacity: 0.3;
        }

        .image-content {
            position: relative;
            z-index: 2;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            width: 100%;
        }

        .image-title {
            font-size: 32px;
            font-weight: 700;
            color: #FFDF73;
            margin-bottom: 20px;
            font-family: 'Sarabun', sans-serif;
        }

        .image-text {
            font-size: 24px;
            line-height: 1.6;
            font-family: 'Sarabun', sans-serif;
            white-space: pre-wrap;
        }

        .image-watermark {
            position: absolute;
            bottom: 15px;
            right: 20px;
            z-index: 2;
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            font-family: 'Sarabun', sans-serif;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            width: 100%;
            max-width: 500px;
        }
        .action-buttons button { flex: 1; }

    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-brands fa-facebook"></i> ระบบสร้างโพสต์ Facebook</h1>
        <a href="admin.html" class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> กลับหน้าแอดมิน</a>
    </div>

    <div class="content-area">
        <!-- Sidebar Controls -->
        <div class="sidebar">
            <h2 style="margin:0; color:#FFDF73; font-size:20px;"><i class="fas fa-edit"></i> ตั้งค่าโพสต์</h2>
            
            <div class="form-group">
                <label>เทมเพลตเนื้อหา (Auto-Generate)</label>
                <div style="display: flex; gap: 10px;">
                    <select class="form-control" id="templateSelect" style="flex:1;">
                        <option value="">-- เลือกเทมเพลต --</option>
                        <option value="daily">ดวงรายวัน (สุ่ม/ดึงข้อมูล)</option>
                        <option value="auspicious">ฤกษ์มงคลประจำวัน</option>
                        <option value="quote">ข้อคิดโหราศาสตร์</option>
                    </select>
                </div>
                <label style="margin-top: 10px; font-size: 13px;">📅 เลือกวันที่โพสต์ (ล่วงหน้า)</label>
                <div style="display: flex; gap: 10px;">
                    <input type="date" class="form-control" id="postDate" style="flex:1;" title="เลือกวันที่สำหรับทำโพสต์ล่วงหน้า (ถ้าไม่เลือกจะใช้วันนี้)">
                    <button class="btn-secondary" id="btnGenerate" style="padding: 0 15px;"><i class="fas fa-bolt"></i> สร้างเนื้อหา</button>
                </div>
            </div>

            <div class="form-group">
                <label>ข้อความโพสต์ (Caption)</label>
                <div class="toolbar">
                    <button class="tool-btn" onclick="insertText('caption', '🌟')">🌟</button>
                    <button class="tool-btn" onclick="insertText('caption', '🔮')">🔮</button>
                    <button class="tool-btn" onclick="insertText('caption', '💖')">💖</button>
                    <button class="tool-btn" onclick="insertText('caption', '💰')">💰</button>
                    <button class="tool-btn" onclick="insertText('caption', '🙏')">🙏</button>
                    <button class="tool-btn" onclick="insertText('caption', '#ดูดวง ')">#ดูดวง</button>
                    <button class="tool-btn" onclick="insertText('caption', '#สยามโหรามงคล ')">#สยามโหรามงคล</button>
                </div>
                <textarea class="form-control" id="captionInput" placeholder="พิมพ์ข้อความโพสต์ที่นี่..."></textarea>
            </div>

            <hr style="border-color: rgba(255,255,255,0.1); margin: 10px 0;">

            <h2 style="margin:0; color:#FFDF73; font-size:20px;"><i class="fas fa-image"></i> ตั้งค่ารูปภาพ</h2>
            
            <div class="form-group">
                <label>หัวข้อรูปภาพ</label>
                <input type="text" class="form-control" id="imageTitle" placeholder="เช่น ดวงคนเกิดวันจันทร์..." value="ดวงวันนี้">
            </div>

            <div class="form-group">
                <label>ข้อความบนรูปภาพ</label>
                <textarea class="form-control" id="imageText" style="min-height: 80px;" placeholder="พิมพ์ข้อความที่จะแสดงบนรูปภาพ..."></textarea>
            </div>

            <div class="form-group">
                <label>พื้นหลังรูปภาพ (Background)</label>
                <select class="form-control" id="bgSelect">
                    <option value="linear-gradient(135deg, #1a1a2e, #16213e)">Midnight Blue (Default)</option>
                    <option value="linear-gradient(135deg, #4b134f, #c94b4b)">Mystic Red</option>
                    <option value="linear-gradient(135deg, #0f2027, #203a43, #2c5364)">Deep Ocean</option>
                    <option value="linear-gradient(135deg, #b79891, #94716b)">Gold & Earth</option>
                    <option value="custom">อัปโหลดรูปภาพของตัวเอง...</option>
                </select>
                <input type="file" id="bgUpload" accept="image/*" style="display:none; margin-top: 10px;" class="form-control">
            </div>
            
            <div class="form-group">
                <label>สีข้อความบนรูป (Text Color)</label>
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <label style="font-size:12px; color:#aaa;">สีหัวข้อ</label>
                        <input type="color" id="titleColor" value="#FFDF73" style="width:100%; height:40px; border:none; border-radius:5px; cursor:pointer; background:none;">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:12px; color:#aaa;">สีเนื้อหา</label>
                        <input type="color" id="textColor" value="#FFFFFF" style="width:100%; height:40px; border:none; border-radius:5px; cursor:pointer; background:none;">
                    </div>
                </div>
            </div>

        </div>

        <!-- Preview Area -->
        <div class="preview-area">
            <h3 style="color:#fff; margin:0; font-weight:400; opacity:0.8;">ตัวอย่างการแสดงผลบน Facebook</h3>
            
            <div class="fb-post-container">
                <div class="fb-header">
                    <!-- Placeholder avatar -->
                    <img src="assets/images/logo.png" onerror="this.src='https://via.placeholder.com/40x40/d4af37/ffffff?text=SH'" class="fb-avatar" alt="Page Avatar">
                    <div class="fb-user-info">
                        <span class="fb-name">สยามโหรามงคล</span>
                        <span class="fb-time">เพิ่งครู่เดียว <i class="fas fa-globe-americas"></i></span>
                    </div>
                </div>
                
                <div class="fb-content" id="fbCaptionPreview">พิมพ์ข้อความโพสต์ที่นี่...</div>

                <!-- Image to be generated/exported -->
                <div id="exportImageArea">
                    <div class="image-bg" id="previewBg"></div>
                    <div class="image-content">
                        <div class="image-title" id="previewTitle">ดวงวันนี้</div>
                        <div class="image-text" id="previewText">พิมพ์ข้อความที่จะแสดงบนรูปภาพ...</div>
                    </div>
                    <div class="image-watermark">เพจ สยามโหรามงคล</div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-secondary" id="btnCopyText"><i class="fas fa-copy"></i> คัดลอกข้อความ (Caption)</button>
                <button class="btn-primary" id="btnDownloadImg"><i class="fas fa-download"></i> ดาวน์โหลดรูปภาพ</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="horo-database.js"></script> <!-- Might be needed for auto-generating text if present -->
    <script src="adminFacebookPost.js"></script>
</body>
</html>
