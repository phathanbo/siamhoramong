<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 ทดสอบ Gun Milan Compatibility</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ddd;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 30px;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 10px;
        }
        .test-section {
            background: #0f3460;
            border: 2px solid #ffd700;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .test-section h2 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .planet-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin: 15px 0;
        }
        .planet-item {
            background: #1a1a2e;
            padding: 12px;
            border-left: 4px solid #ffd700;
            border-radius: 4px;
        }
        .planet-item strong {
            color: #ffd700;
        }
        .planet-item .symbol {
            font-size: 24px;
            margin-right: 5px;
        }
        .test-input {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            color: #ffd700;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="date"] {
            padding: 10px;
            background: #1a1a2e;
            border: 1px solid #ffd700;
            color: #ffd700;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            background: #ffd700;
            color: #1a1a2e;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        button:hover {
            background: #ffed4e;
        }
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .score-card {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #ffd700;
            text-align: center;
        }
        .score-card .label {
            color: #ffd700;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .score-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #4ade80;
        }
        .total-score {
            grid-column: 1 / -1;
            background: #0f3460;
            padding: 20px;
            border-radius: 4px;
            border: 2px solid #ffd700;
            text-align: center;
        }
        .total-score .big-number {
            font-size: 48px;
            color: #ffd700;
            margin: 10px 0;
        }
        .total-score .percentage {
            font-size: 24px;
            color: #4ade80;
        }
        .compatibility-text {
            text-align: center;
            margin: 15px 0;
            padding: 15px;
            background: #1a1a2e;
            border-radius: 4px;
            border-left: 4px solid #4ade80;
        }
        .error {
            background: #7f1d1d;
            border: 1px solid #dc2626;
            color: #fca5a5;
            padding: 15px;
            border-radius: 4px;
            margin: 15px 0;
        }
        .success {
            background: #0f3460;
            border: 1px solid #4ade80;
            color: #86efac;
            padding: 15px;
            border-radius: 4px;
            margin: 15px 0;
        }
        .badge {
            display: inline-block;
            padding: 5px 10px;
            background: #1a1a2e;
            border: 1px solid #ffd700;
            border-radius: 20px;
            font-size: 12px;
            color: #ffd700;
            margin: 5px;
        }
        .badge.good {
            border-color: #4ade80;
            color: #4ade80;
        }
        .badge.warning {
            border-color: #f59e0b;
            color: #f59e0b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 ทดสอบ Gun Milan - ความเข้ากันตามโหราศาสตร์</h1>

        <!-- Test 1: Check planets -->
        <div class="test-section">
            <h2>📊 ทดสอบที่ 1: ตรวจสอบดาวทั้ง 9 ตัว</h2>
            <div id="planetsTest"></div>
        </div>

        <!-- Test 2: Compatibility calculator -->
        <div class="test-section">
            <h2>💑 ทดสอบที่ 2: คำนวณความเข้ากัน (Gun Milan)</h2>
            <div class="test-input">
                <div class="form-group">
                    <label for="yourDate">📅 วันเกิดของคุณ:</label>
                    <input type="date" id="yourDate" value="2000-01-04">
                    <small style="color: #999; margin-top: 5px;">วันที่ 4 = ราหู (Rahu)</small>
                </div>
                <div class="form-group">
                    <label for="partnerDate">📅 วันเกิดของคู่:</label>
                    <input type="date" id="partnerDate" value="1999-05-07">
                    <small style="color: #999; margin-top: 5px;">วันที่ 7 = เกตุ (Ketu)</small>
                </div>
            </div>
            <button onclick="testCompatibility()">🔍 คำนวณความเข้ากัน</button>
            <div id="compatibilityResult"></div>
        </div>

        <!-- Test 3: New planets data -->
        <div class="test-section">
            <h2>🌟 ทดสอบที่ 3: ตรวจสอบข้อมูลดาวใหม่ (ราหู & เกตุ)</h2>
            <div id="newPlanetsTest"></div>
        </div>

        <!-- Test 4: Element compatibility -->
        <div class="test-section">
            <h2>🌊 ทดสอบที่ 4: ความเข้ากันของธาตุ (Bhakoot Gun)</h2>
            <div id="elementTest"></div>
        </div>
    </div>

    <!-- Load relation.js -->
    <script src="relation.js"></script>
    <script>
        /**
         * Test functions
         */

        // Test 1: Verify all planets
        function testPlanets() {
            const resultDiv = document.getElementById('planetsTest');
            let html = '<div class="success">✅ ทุกดาวถูกกำหนดแล้ว:</div>';
            html += '<div class="planet-list">';

            for (let i = 1; i <= 9; i++) {
                const planet = PATNI_BY_PLANET[i];
                if (planet) {
                    html += `
                        <div class="planet-item">
                            <span class="symbol">${planet.symbol}</span>
                            <strong>[${i}] ${planet.planet}</strong><br>
                            <small>ธาตุ: ${planet.element} | วรรณะ: ${planet.varna}</small>
                        </div>
                    `;
                }
            }
            html += '</div>';
            resultDiv.innerHTML = html;
        }

        // Test 2: Calculate compatibility
        function testCompatibility() {
            const resultDiv = document.getElementById('compatibilityResult');
            const yourDateEl = document.getElementById('yourDate');
            const partnerDateEl = document.getElementById('partnerDate');

            if (!yourDateEl.value || !partnerDateEl.value) {
                resultDiv.innerHTML = '<div class="error">❌ กรุณาเลือกวันเกิดของทั้งคู่</div>';
                return;
            }

            const yourDate = new Date(yourDateEl.value);
            const partnerDate = new Date(partnerDateEl.value);

            const yourDay = yourDate.getDate();
            const partnerDay = partnerDate.getDate();

            const yourPlanetNum = (yourDay % 9) || 9;
            const partnerPlanetNum = (partnerDay % 9) || 9;

            const yourPlanet = PATNI_BY_PLANET[yourPlanetNum];
            const partnerPlanet = PATNI_BY_PLANET[partnerPlanetNum];

            // Calculate Gun Milan
            const scores = calculateGunMilan(yourPlanetNum, partnerPlanetNum);
            const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
            const maxScore = 36;
            const compatibilityPercent = Math.round((totalScore / maxScore) * 100);

            let html = '<div class="success">✅ ผลการคำนวณ Gun Milan:</div>';
            html += '<div class="results">';
            html += `<div class="score-card"><div class="label">🎯 Varna Gun</div><div class="value">${scores.varna}/4</div></div>`;
            html += `<div class="score-card"><div class="label">🌊 Bhakoot Gun</div><div class="value">${scores.bhakoot}/7</div></div>`;
            html += `<div class="score-card"><div class="label">💫 Gana Gun</div><div class="value">${scores.gana}/6</div></div>`;
            html += `<div class="score-card"><div class="label">🤝 Graha Maitri</div><div class="value">${scores.graha}/5</div></div>`;
            html += `<div class="total-score">
                        <div class="label">📊 รวม Gun Milan</div>
                        <div class="big-number">${totalScore}/${maxScore}</div>
                        <div class="percentage">${compatibilityPercent}%</div>
                        <div style="margin-top: 10px; color: #ffd700;">
                            ${getCompatibilityText(compatibilityPercent)}
                        </div>
                    </div>`;
            html += '</div>';

            html += `<div class="compatibility-text">
                        <strong>${yourPlanet.symbol} ${yourPlanet.planet}</strong> ↔️
                        <strong>${partnerPlanet.symbol} ${partnerPlanet.planet}</strong><br>
                        มิตรภาพ: <span class="badge">${GRAHA_MAITRI[yourPlanetNum][partnerPlanetNum]}</span>
                    </div>`;

            resultDiv.innerHTML = html;
        }

        // Test 3: New planets data
        function testNewPlanets() {
            const resultDiv = document.getElementById('newPlanetsTest');
            const rahuData = PATNI_BY_PLANET[4];
            const ketuData = PATNI_BY_PLANET[7];

            let html = '<div class="success">✅ ดาวใหม่ (Rahu & Ketu) ได้เพิ่มข้อมูลแล้ว:</div>';
            html += '<div class="planet-list">';
            html += `
                <div class="planet-item">
                    <strong><span class="symbol">${rahuData.symbol}</span> [4] ${rahuData.planet}</strong><br>
                    <small><strong>ธาตุ:</strong> ${rahuData.element}</small><br>
                    <small><strong>วรรณะ:</strong> ${rahuData.varna}</small><br>
                    <small><strong>ลักษณะ:</strong> ${rahuData.character}</small><br>
                    <small><strong>จุดแข็ง:</strong> ${rahuData.strength}</small>
                </div>
                <div class="planet-item">
                    <strong><span class="symbol">${ketuData.symbol}</span> [7] ${ketuData.planet}</strong><br>
                    <small><strong>ธาตุ:</strong> ${ketuData.element}</small><br>
                    <small><strong>วรรณะ:</strong> ${ketuData.varna}</small><br>
                    <small><strong>ลักษณะ:</strong> ${ketuData.character}</small><br>
                    <small><strong>จุดแข็ง:</strong> ${ketuData.strength}</small>
                </div>
            `;
            html += '</div>';
            resultDiv.innerHTML = html;
        }

        // Test 4: Element compatibility
        function testElementCompatibility() {
            const resultDiv = document.getElementById('elementTest');
            const testCases = [
                { num1: 1, num2: 9, desc: '☀️ Sun (ไฟ) vs ♂ Mars (ไฟ)' },
                { num1: 2, num2: 6, desc: '🌙 Moon (น้ำ) vs ♀ Venus (น้ำ)' },
                { num1: 1, num2: 2, desc: '☀️ Sun (ไฟ) vs 🌙 Moon (น้ำ)' },
                { num1: 4, num2: 7, desc: '🌑 Rahu (อากาศ) vs ☋ Ketu (ไฟ)' }
            ];

            let html = '<div class="success">✅ ทดสอบความเข้ากันของธาตุ:</div>';
            html += '<div class="planet-list">';

            testCases.forEach(test => {
                const scores = calculateGunMilan(test.num1, test.num2);
                const bhakootPercent = (scores.bhakoot / 7) * 100;
                const badge = bhakootPercent >= 75 ? 'badge good' : bhakootPercent >= 50 ? 'badge warning' : 'badge';

                html += `
                    <div class="planet-item">
                        <strong>${test.desc}</strong><br>
                        <small>Bhakoot Gun: ${scores.bhakoot}/7</small><br>
                        <span class="${badge}">${bhakootPercent.toFixed(0)}%</span>
                    </div>
                `;
            });

            html += '</div>';
            resultDiv.innerHTML = html;
        }

        // Run all tests on page load
        document.addEventListener('DOMContentLoaded', function() {
            testPlanets();
            testNewPlanets();
            testElementCompatibility();
            // Test compatibility with default values
            setTimeout(testCompatibility, 100);
        });
    </script>
</body>
</html>
