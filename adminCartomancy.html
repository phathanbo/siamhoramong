<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้างภาพไพ่ป๊อก - สยามโหรามงคล</title>
    
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cartomancy.css">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #121212; color: #fff; }
        .control-panel { background: #1a1a1a; padding: 20px; border-right: 1px solid #333; height: 100vh; position: sticky; top: 0; overflow-y: auto; }
        .preview-panel { padding: 40px; background: #0a0a0a; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; }
        
        #adminCartomancyCaptureArea {
            width: 900px;
            background: linear-gradient(135deg, #1a0831 0%, #0d041a 100%);
            border: 4px solid #e9b64c;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            font-family: 'Sarabun', sans-serif;
            position: relative;
        }
        
        .card-container-3 {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .meaning-box-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
    </style>
</head>
<body>

    <div class="container-fluid p-0">
        <div class="row m-0">
            <!-- Left: Controls -->
            <div class="col-md-4 col-lg-3 control-panel shadow">
                <button class="btn btn-outline-light btn-block mb-4" onclick="window.location.href='admin.html'">
                    <i class="fas fa-arrow-left"></i> กลับไประบบหลังบ้าน
                </button>
                
                <h4 class="text-gold mb-4"><i class="fas fa-heart mr-2"></i> สร้างภาพไพ่ป๊อก</h4>
                
                <div class="form-group mb-4">
                    <label class="text-white">เลือกรูปแบบการทำนาย:</label>
                    <select id="drawType" class="form-control bg-dark text-white border-gold">
                        <option value="1">ทำนาย 1 ใบ (ภาพรวม)</option>
                        <option value="3">ทำนาย 3 ใบ (อดีต ปัจจุบัน อนาคต)</option>
                    </select>
                </div>

                <button class="btn btn-danger btn-block py-3 mb-4" style="font-weight: bold; border-radius: 10px;" onclick="adminDrawCartomancyPage()">
                    <i class="fas fa-random mr-2"></i> สุ่มไพ่ใหม่ (Draw)
                </button>
                
                <div class="form-group mb-3">
                    <label class="text-gold">ข้อความเสริม (หัวกระดาษ):</label>
                    <input type="text" id="adminCartomancyCustomText" class="form-control bg-dark text-white border-secondary" placeholder="เช่น แด่คุณลูกค้า VIP">
                </div>
                
                <hr class="border-secondary my-4">
                
                <button class="btn btn-warning btn-block py-3" style="font-weight: bold; border-radius: 10px; background: linear-gradient(135deg, #f1c40f, #d4af37); color: #000; border: none;" onclick="downloadAdminCartomancyImagePage()">
                    <i class="fas fa-download mr-2"></i> ดาวน์โหลดรูปภาพ
                </button>
                <small class="text-muted mt-2 d-block text-center">ภาพจะถูกบันทึกเป็น PNG ความคมชัดสูง</small>
            </div>
            
            <!-- Right: Preview Area -->
            <div class="col-md-8 col-lg-9 preview-panel">
                <div id="adminCartomancyPreviewContainer" style="width: 100%; display: flex; justify-content: center; align-items: flex-start; overflow-x: auto;">
                    <canvas id="cartomancyCanvas" style="max-width: 100%; height: auto; border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.5);"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="cartomancy-data.js"></script>
    <script src="adminCartomancy.js"></script>
    
    <script>
        document.getElementById('adminCartomancyCustomText').addEventListener('input', function(e) {
            // เราจะวาดใหม่เมื่อมีการเปลี่ยนข้อความ
            if (window.lastDrawnCards) {
                renderCanvas(document.getElementById('drawType').value, window.lastDrawnCards);
            }
        });
        
        // Initial drawing (empty state)
        window.onload = function() {
            renderEmptyCanvas();
        };
    </script>
</body>
</html>
