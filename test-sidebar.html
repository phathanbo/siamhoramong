<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Sidebar Calculations</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .section {
            background: #1e293b;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 3px solid #eab308;
        }
        h1 { color: #eab308; }
        h2 { color: #94a3b8; font-size: 14px; margin-top: 0; }
        input, button {
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            border-radius: 4px;
        }
        button {
            background: #eab308;
            color: #0f172a;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #f0e0b0;
        }
        .result {
            background: #0f172a;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .success { color: #4ade80; }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 Test Sidebar Calculations</h1>
        
        <div class="section">
            <h2>📝 บันทึกข้อมูลสำหรับทดสอบ</h2>
            <input type="text" id="userName" placeholder="ชื่อของคุณ" value="ทดสอบ">
            <input type="number" id="birthDate" placeholder="วันเกิด (1-31)" value="15" min="1" max="31">
            <input type="number" id="birthMonth" placeholder="เดือนเกิด (1-12)" value="5" min="1" max="12">
            <input type="number" id="birthYear" placeholder="ปีเกิด" value="2540">
            <button onclick="saveTestData()">💾 บันทึกข้อมูล</button>
            <div id="saveResult" class="result"></div>
        </div>

        <div class="section">
            <h2>🧮 ผลการคำนวนจาก SidebarCalculations</h2>
            <button onclick="testCalculations()">🧪 ทดสอบคำนวน</button>
            <div id="calcResult" class="result"></div>
        </div>

        <div class="section">
            <h2>✨ ผลการแสดงผล Sidebar</h2>
            <button onclick="testRender()">🎨 ทดสอบแสดงผล</button>
            <div id="renderResult" class="result"></div>
        </div>

        <div class="section">
            <h2>📊 ข้อมูลใน LocalStorage</h2>
            <button onclick="showLocalStorage()">📂 แสดงข้อมูล</button>
            <div id="storageResult" class="result"></div>
        </div>
    </div>

    <script src="sidebarCalculations.js"></script>
    <script>
        function saveTestData() {
            const userName = document.getElementById('userName').value;
            const birthDate = document.getElementById('birthDate').value;
            const birthMonth = document.getElementById('birthMonth').value;
            const birthYear = document.getElementById('birthYear').value;

            localStorage.setItem('thaiHoroUserName', userName);
            localStorage.setItem('birthDate', birthDate);
            localStorage.setItem('birthMonth', birthMonth);
            localStorage.setItem('birthYear', birthYear);

            const result = document.getElementById('saveResult');
            result.innerHTML = `<span class="success">✅ บันทึกสำเร็จ</span><br>
                ชื่อ: ${userName}<br>
                วันเกิด: ${birthDate}/${birthMonth}/${birthYear}`;
        }

        function testCalculations() {
            const result = document.getElementById('calcResult');
            try {
                const summary = SidebarCalculations.getUserSummary();
                result.innerHTML = `<span class="success">✅ คำนวนสำเร็จ</span><br><pre>${JSON.stringify(summary, null, 2)}</pre>`;
            } catch (e) {
                result.innerHTML = `<span class="error">❌ ผิดพลาด: ${e.message}</span>`;
            }
        }

        function testRender() {
            const result = document.getElementById('renderResult');
            try {
                const summary = SidebarCalculations.getUserSummary();
                let html = '';

                if (summary.name && summary.name !== 'ผู้มาเยือน') {
                    html += `<strong>👤 ชื่อ:</strong> ${summary.name} (เลข: ${summary.nameNumber})<br>`;
                }

                if (summary.zodiac) {
                    html += `<strong>${summary.zodiacIcon} ราศี:</strong> ${summary.zodiac} (${summary.zodiacElement})<br>`;
                }

                if (summary.lifePath) {
                    html += `<strong>🔢 หลักชีวิต:</strong> ${summary.lifePath}<br>`;
                }

                if (summary.luckyNumbers && summary.luckyNumbers.length > 0) {
                    html += `<strong>🎰 เลขนำโชค:</strong> ${summary.luckyNumbers.join(', ')}<br>`;
                }

                if (summary.luckyColors && summary.luckyColors.length > 0) {
                    html += `<strong>🎨 สีมงคล:</strong> ${summary.luckyColors.join(', ')}<br>`;
                }

                if (summary.dailyFortune) {
                    html += `<strong>✨ ทำนายวันนี้:</strong> ${summary.dailyFortune}<br>`;
                }

                if (html === '') {
                    html = '<span class="error">❌ ไม่มีข้อมูล - บันทึกข้อมูลเสียก่อน</span>';
                } else {
                    html = '<span class="success">✅ แสดงผลสำเร็จ</span><br>' + html;
                }

                result.innerHTML = html;
            } catch (e) {
                result.innerHTML = `<span class="error">❌ ผิดพลาด: ${e.message}</span>`;
            }
        }

        function showLocalStorage() {
            const result = document.getElementById('storageResult');
            const keys = ['thaiHoroUserName', 'birthDate', 'birthMonth', 'birthYear'];
            let html = '<strong>LocalStorage:</strong><br>';
            keys.forEach(key => {
                const value = localStorage.getItem(key);
                html += `${key}: <span class="${value ? 'success' : 'error'}">${value || 'ว่าง'}</span><br>`;
            });
            result.innerHTML = html;
        }

        // ทดสอบอัตโนมัติเมื่อโหลดหน้า
        window.addEventListener('load', () => {
            console.log('✅ Sidebar Calculations loaded');
            console.log(SidebarCalculations);
        });
    </script>
</body>
</html>
